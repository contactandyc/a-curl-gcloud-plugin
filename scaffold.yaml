  - https://github.com/contactandyc/the-io-library.git
  - https://github.com/contactandyc/a-curl-library.git
  - common/libjwt
  - common/lexbor

copyright_overrides:
  # ── Entirely New Directories ──
  "**/gmail.?":
    - contributors.andy_curtis


