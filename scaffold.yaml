project_title: a-curl-gcloud-plugin
version: "0.1.3"
description: "A dynamically scaffolded c/cmake project"
stack: c/cmake
date_created: 2025-01-01

profile: default-knode

# ── 1. Scaffolding Engine Source ──
base_templates:
  repo: https://github.com/contactandyc/scaffold-templates.git
  ref: main

# ── Dynamic Setup Variables ──
c_standard: "23"
cxx_standard: "17"

